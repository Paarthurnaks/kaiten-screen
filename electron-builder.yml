appId: com.kaitenscreen.app
productName: Kaiten Screen
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
